<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Stackly Estates — Page not found. Browse our premium luxury real estate listings.">
  <meta name="theme-color" content="#0F172A">
  <meta name="robots" content="noindex, nofollow">
  <title>404 | Stackly Estates</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/404.css">
</head>
<body>
  <div class="page-loader" id="page-loader"><div class="page-loader__spinner"></div></div>

  <main class="error-page" role="main">
    <div class="error-page__bg" aria-hidden="true">
      <div class="error-page__gradient"></div>
      <div class="error-page__glow error-page__glow--1"></div>
      <div class="error-page__glow error-page__glow--2"></div>
      <div class="error-page__glow error-page__glow--3"></div>
    </div>

    <div class="error-page__container">
      <div class="error-page__left">
        <div class="error-page__code">
          <span class="error-page__digit" aria-hidden="true">4</span>
          <span class="error-page__digit error-page__digit--zero" aria-hidden="true">0</span>
          <span class="error-page__digit" aria-hidden="true">4</span>
        </div>
        <div class="error-page__accent-line"></div>
        <h1 class="error-page__title">Oops! The Property You're Looking For Doesn't Exist</h1>
        <p class="error-page__text">The page may have been moved, renamed, or is temporarily unavailable. Let's help you get back to exploring premium properties.</p>
        <div class="error-page__actions">
          <a href="index.html" class="error-page__btn error-page__btn--primary">Go to Home</a>
          <button type="button" class="error-page__btn error-page__btn--secondary" id="btn-back">Go Back</button>
        </div>
      </div>

      <div class="error-page__right">
        <div class="error-page__image-wrap">
          <div class="error-page__image">
            <img src="assets/images/404-luxury-home.webp" alt="Modern luxury estate property" width="800" height="1000" loading="eager" decoding="async">
          </div>
          <div class="error-page__image-accent" aria-hidden="true"></div>
        </div>
      </div>
    </div>

    <div class="error-page__popular">
      <div class="error-page__popular-inner">
        <p class="error-page__popular-label">Popular Pages</p>
        <div class="error-page__cards">
          <a href="index.html" class="error-page__card" data-delay="0">
            <div class="error-page__card-icon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            </div>
            <span class="error-page__card-title">Home</span>
          </a>
          <a href="properties.html" class="error-page__card" data-delay="100">
            <div class="error-page__card-icon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><path d="M9 22v-4h6v4"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="12" y2="18"/></svg>
            </div>
            <span class="error-page__card-title">Properties</span>
          </a>
          <a href="services.html" class="error-page__card" data-delay="200">
            <div class="error-page__card-icon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
            </div>
            <span class="error-page__card-title">Services</span>
          </a>
          <a href="contact.html" class="error-page__card" data-delay="300">
            <div class="error-page__card-icon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </div>
            <span class="error-page__card-title">Contact</span>
          </a>
        </div>
      </div>
    </div>
  </main>

  <script src="assets/js/404.js"></script>
</body>
</html>
